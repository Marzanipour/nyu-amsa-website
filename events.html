<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMSA at NYU Events</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="site-brand" href="index.html">
        <span><strong>AMSA</strong> at NYU</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">About</a>
        <a href="membership.html">Membership</a>
        <a class="is-active" href="events.html">Events</a>
        <a href="jobs.html">Jobs</a>
      </nav>
    </header>

    <main class="directory-page">
      <section class="directory-hero">
        <p class="section-kicker">Calendar</p>
        <h1>Events</h1>
        <p>
          Upcoming AMSA meetings, workshops, socials, and application support
          sessions will appear here.
        </p>
      </section>

      <section class="directory-toolbar" aria-label="Events update note">
        <p>Edit <code>data/events.js</code> to add or update events.</p>
      </section>

      <section class="listing-grid" id="eventsList" aria-label="Events list"></section>
    </main>

    <script src="data/events.js"></script>
    <script src="listing-page.js"></script>
    <script>
      renderListingPage({
        targetId: "eventsList",
        items: window.AMSA_EVENTS,
        emptyTitle: "No events yet",
        emptyMessage: "Check back soon for upcoming AMSA at NYU events.",
        actionLabel: "Details"
      });
    </script>
  </body>
</html>
